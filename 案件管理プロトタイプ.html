<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>案件管理 | ContractS CLM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,300..700,0..1,-50..200&family=Noto+Sans+JP:wght@400;500;700&display=swap">
<style>
/* ─────────────────────────────────────────
   DESIGN TOKENS (ContractS CLM v0.2)
───────────────────────────────────────── */
:root {
  /* Brand */
  --c-primary:        #00AA9C;
  --c-primary-dark:   #008479;
  --c-primary-light:  #48C29B;
  --c-primary-pale:   #DFF3F1;
  --c-primary-surf:   #F1FAFB;
  /* Navy */
  --c-navy:           #314574;
  --c-navy-strong:    #141D3D;
  /* Danger */
  --c-danger:         #E64C5B;
  --c-danger-dark:    #B9281C;
  --c-danger-subtle:  #FDEDEE;
  /* Warning */
  --c-warning:        #FACF05;
  --c-warning-subtle: #FFFCE0;
  --c-warning-text:   #92600A;
  /* Neutral */
  --c-white:          #FFFFFF;
  --c-bg-page:        #F8FAFC;
  --c-bg-table-hd:    #FCFDFE;
  --c-bg-hover:       #F0F3FA;
  --c-bg-disabled:    #F8FAFC;
  --c-border:         #E4E7ED;
  --c-border-subtle:  #F0F3FA;
  --c-text:           #353947;
  --c-text-muted:     #A8ADBA;
  --c-text-section:   #73767F;
  /* Radius */
  --r-control: 4px;
  --r-card:    6px;
  --r-modal:   8px;
  /* Shadow */
  --sh-card:    0 2px 8px rgba(20,29,61,0.08);
  --sh-overlay: 0 4px 24px rgba(20,29,61,0.14);
}

/* ─────────────────────────────────────────
   RESET & BASE
───────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 14px;
  font-weight: 400;
  line-height: 20px;
  color: var(--c-text);
  background: var(--c-bg-page);
  -webkit-font-smoothing: antialiased;
}
button, input, select { font: inherit; color: inherit; }
button { cursor: pointer; border: none; background: none; }
a { color: inherit; text-decoration: none; }
[hidden] { display: none !important; }
.material-symbols-rounded {
  font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
  font-size: 20px;
  line-height: 1;
  vertical-align: middle;
}

/* ─────────────────────────────────────────
   APP SHELL
───────────────────────────────────────── */
.app-shell { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

/* ─────────────────────────────────────────
   GLOBAL NAVBAR (Navbar component)
   height: 48px | bg: #141D3D
───────────────────────────────────────── */
.global-header {
  display: flex;
  align-items: center;
  height: 48px;
  padding: 0 16px;
  background: var(--c-navy-strong);
  color: var(--c-white);
  flex-shrink: 0;
  z-index: 10;
}
.header-left { display: flex; align-items: center; }
.brand-area  { display: flex; align-items: center; gap: 12px; }
.logo-button {
  display: inline-flex; align-items: center; justify-content: center;
  width: 30px; height: 30px; border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.24);
  background: rgba(255,255,255,0.08);
  color: var(--c-white);
}
.company-button {
  display: inline-flex; align-items: center; gap: 8px;
  background: none; border: none; color: var(--c-white);
  font-size: 14px; font-weight: 700;
  cursor: pointer; padding: 0;
}
.company-caret { font-size: 10px; opacity: .7; }
.header-divider {
  width: 1px; height: 20px;
  background: rgba(255,255,255,0.16);
  margin: 0 16px 0 16px;
  flex-shrink: 0;
}
.global-nav { display: flex; align-items: center; }
.nav-item {
  display: inline-flex; align-items: center; height: 48px;
  padding: 0 20px;
  font-size: 14px; font-weight: 700; color: var(--c-white);
  transition: background .1s;
}
.nav-item:hover { background: rgba(255,255,255,0.08); }
.nav-item.is-active { background: var(--c-navy); }
.utility-nav { display: flex; align-items: center; gap: 16px; margin-left: auto; }
.utility-button {
  display: inline-flex; align-items: center; justify-content: center;
  width: 24px; height: 24px; border-radius: 50%;
  background: none; border: none; color: rgba(255,255,255,0.84);
  position: relative;
}
.utility-button:hover { color: var(--c-white); }
.utility-dot {
  position: absolute; top: 0; right: 0;
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--c-danger);
  border: 1.5px solid var(--c-navy-strong);
}
.avatar-button {
  display: inline-flex; align-items: center; justify-content: center;
  width: 30px; height: 30px; border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.24);
  background: rgba(255,255,255,0.08);
  color: var(--c-white);
}

/* ─────────────────────────────────────────
   LAYOUT BODY
───────────────────────────────────────── */
.layout-body {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ─────────────────────────────────────────
   LEFT FILTER SIDEBAR
   White bg | Collapsible to rail
───────────────────────────────────────── */
.filter-sidebar {
  width: 224px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  background: var(--c-white);
  border-right: 1px solid var(--c-border);
  transition: width .2s ease;
  overflow: hidden;
}
.filter-sidebar.collapsed { width: 40px; }
.filter-sidebar-inner { flex: 1; overflow-y: auto; padding: 20px 16px 16px; min-width: 224px; }
.filter-sidebar.collapsed .filter-sidebar-inner { display: none; }
.filter-sidebar-rail { display: none; flex-direction: column; align-items: center; padding: 16px 0; gap: 16px; }
.filter-sidebar.collapsed .filter-sidebar-rail { display: flex; }
.rail-icon { color: var(--c-text-muted); font-size: 20px; }

.filter-section-title {
  font-size: 12px; font-weight: 700; color: var(--c-text-muted);
  text-transform: uppercase; letter-spacing: .05em;
  margin-bottom: 16px;
}
.filter-fields { display: flex; flex-direction: column; gap: 12px; }
.filter-field { display: flex; flex-direction: column; gap: 8px; }
.filter-label { font-size: 12px; font-weight: 700; color: var(--c-text-section); }
.filter-input, .filter-select {
  height: 32px; padding: 0 8px;
  border: 1px solid var(--c-border);
  border-radius: var(--r-control);
  background: var(--c-white);
  font-size: 14px; color: var(--c-text);
  outline: none;
  width: 100%;
  transition: border-color .15s;
}
.filter-input::placeholder { color: var(--c-text-muted); }
.filter-input:focus, .filter-select:focus { border-color: var(--c-primary); }
.filter-actions { display: flex; flex-direction: column; gap: 8px; margin-top: 20px; }

/* Buttons (pill shape) */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  font-weight: 700; white-space: nowrap; border: 1px solid transparent;
  cursor: pointer; transition: background .15s, border-color .15s, color .15s;
  line-height: 1;
}
.btn-lg { height: 40px; padding: 0 16px; border-radius: 20px; font-size: 12px; min-width: 86px; }
.btn-md { height: 32px; padding: 0 12px; border-radius: 16px; font-size: 12px; min-width: 70px; }
.btn-sm { height: 24px; padding: 0 10px; border-radius: 12px; font-size: 10px; min-width: 62px; }
.btn-primary { background: var(--c-primary); color: var(--c-white); border-color: var(--c-primary); }
.btn-primary:hover { background: var(--c-primary-dark); border-color: var(--c-primary-dark); }
.btn-outline { background: transparent; color: var(--c-primary); border-color: var(--c-primary); }
.btn-outline:hover { background: var(--c-bg-hover); }
.btn-light { background: var(--c-bg-hover); color: var(--c-text); border-color: var(--c-border-subtle); }
.btn-light:hover { background: var(--c-primary-surf); }

.sidebar-toggle-area {
  border-top: 1px solid var(--c-border-subtle);
  padding: 12px 16px;
  display: flex;
  justify-content: flex-end;
}
.filter-sidebar.collapsed .sidebar-toggle-area { justify-content: center; padding: 12px 0; }
.sidebar-toggle-btn {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px; font-weight: 700; color: var(--c-text-section);
  padding: 4px 0;
}
.sidebar-toggle-btn:hover { color: var(--c-text); }
.sidebar-toggle-btn .material-symbols-rounded { font-size: 18px; }

/* ─────────────────────────────────────────
   MAIN CONTENT AREA
───────────────────────────────────────── */
.main-content { flex: 1; overflow-y: auto; background: var(--c-bg-page); }

/* Pages */
.page { display: none; padding: 24px; min-height: 100%; }
.page.is-active { display: block; }

/* Page header */
.page-header { margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; }
.page-title { font-size: 20px; font-weight: 700; line-height: 28px; color: var(--c-text); }
.page-header-actions { display: flex; align-items: center; gap: 8px; }

/* Back nav */
.back-nav { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
.back-link {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 12px; font-weight: 700; color: var(--c-primary);
  cursor: pointer;
}
.back-link:hover { color: var(--c-primary-dark); text-decoration: underline; }
.breadcrumb-sep { color: var(--c-text-muted); font-size: 12px; }
.breadcrumb-current { font-size: 12px; color: var(--c-text-section); }

/* ─────────────────────────────────────────
   TABLE SECTION (Section Surface)
───────────────────────────────────────── */
.table-section {
  background: var(--c-white);
  border: 1px solid var(--c-border);
  border-radius: var(--r-card);
  box-shadow: var(--sh-card);
  overflow: hidden;
}
.table-section-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px;
  border-bottom: 1px solid var(--c-border-subtle);
}
.table-section-meta { font-size: 12px; color: var(--c-text-section); }
.table-section-meta strong { color: var(--c-text); font-weight: 700; }
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
thead th {
  padding: 8px 12px;
  text-align: left;
  font-size: 12px; font-weight: 700;
  color: var(--c-text-section);
  background: var(--c-bg-table-hd);
  border-bottom: 1px solid var(--c-border);
  white-space: nowrap;
}
tbody tr {
  height: 40px;
  border-bottom: 1px solid var(--c-border-subtle);
  cursor: pointer;
  transition: background .1s;
}
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--c-bg-hover); }
tbody td { padding: 8px 12px; font-size: 14px; color: var(--c-text); vertical-align: middle; }
.cell-primary { font-weight: 700; color: var(--c-primary); }
.cell-sub { font-size: 12px; color: var(--c-text-section); margin-top: 2px; }
.cell-right { text-align: right; }

/* ─────────────────────────────────────────
   BADGE (status indicator)
   height: 20px | radius: 10px | 12px/600
───────────────────────────────────────── */
.badge {
  display: inline-flex; align-items: center;
  height: 20px; padding: 0 8px;
  border-radius: 10px;
  font-size: 12px; font-weight: 700;
  line-height: 20px; white-space: nowrap;
}
.badge-success  { background: var(--c-primary-pale); color: var(--c-primary); }
.badge-warning  { background: var(--c-warning-subtle); color: var(--c-warning-text); }
.badge-info     { background: #EEF1F8; color: var(--c-navy); }
.badge-neutral  { background: var(--c-bg-hover); color: var(--c-text-section); }
.badge-danger   { background: var(--c-danger-subtle); color: var(--c-danger); }

/* ─────────────────────────────────────────
   PROGRESS (task count)
───────────────────────────────────────── */
.progress-wrap { display: flex; align-items: center; gap: 8px; }
.progress-bar { width: 80px; height: 4px; background: var(--c-border); border-radius: 99px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--c-primary); border-radius: 99px; }
.progress-label { font-size: 12px; color: var(--c-text-section); font-weight: 700; }

/* ─────────────────────────────────────────
   DETAIL INFO CARD
───────────────────────────────────────── */
.info-card {
  background: var(--c-white);
  border: 1px solid var(--c-border);
  border-radius: var(--r-card);
  box-shadow: var(--sh-card);
  padding: 16px;
  margin-bottom: 24px;
}
.info-card-header {
  display: flex; align-items: flex-start; justify-content: space-between;
  margin-bottom: 16px;
}
.info-card-title { font-size: 16px; font-weight: 700; line-height: 24px; color: var(--c-text); }
.meta-grid { display: flex; gap: 24px; flex-wrap: wrap; }
.meta-item { display: flex; flex-direction: column; gap: 4px; }
.meta-label { font-size: 12px; font-weight: 700; color: var(--c-text-muted); }
.meta-value { font-size: 14px; font-weight: 500; color: var(--c-text); }

/* ─────────────────────────────────────────
   SECTION BLOCK (with title)
───────────────────────────────────────── */
.section-block { margin-bottom: 24px; }
.section-block-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.section-block-title {
  display: flex; align-items: center; gap: 8px;
  font-size: 14px; font-weight: 700; color: var(--c-text);
}
.section-block-title .material-symbols-rounded { font-size: 18px; color: var(--c-text-section); }
.count-badge {
  display: inline-flex; align-items: center;
  height: 20px; padding: 0 8px;
  border-radius: 10px;
  background: var(--c-bg-hover);
  font-size: 12px; font-weight: 700; color: var(--c-text-section);
  border: 1px solid var(--c-border-subtle);
}

/* ─────────────────────────────────────────
   CONTRACT ACCORDION
   契約書 > タスク の階層表示
───────────────────────────────────────── */
.contract-list { display: flex; flex-direction: column; gap: 8px; }
.contract-card {
  background: var(--c-white);
  border: 1px solid var(--c-border);
  border-radius: var(--r-card);
  box-shadow: var(--sh-card);
  overflow: hidden;
}
.contract-card-header {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 16px;
  cursor: pointer;
  user-select: none;
  transition: background .1s;
}
.contract-card-header:hover { background: var(--c-bg-hover); }
.contract-chevron {
  font-size: 18px; color: var(--c-text-muted);
  flex-shrink: 0;
  transition: transform .2s;
}
.contract-card.is-open .contract-chevron { transform: rotate(90deg); }
.contract-name { flex: 1; font-size: 14px; font-weight: 700; color: var(--c-text); display: flex; align-items: center; gap: 6px; }
.contract-icon { font-size: 16px; color: var(--c-primary); }
.contract-header-meta { display: flex; align-items: center; gap: 12px; }
.contract-meta-text { font-size: 12px; color: var(--c-text-muted); }
.contract-tasks-body { display: none; border-top: 1px solid var(--c-border-subtle); background: #FAFBFC; }
.contract-card.is-open .contract-tasks-body { display: block; }

/* Task table inside accordion */
.task-table { width: 100%; border-collapse: collapse; }
.task-table thead th {
  padding: 6px 12px;
  font-size: 11px; font-weight: 700; color: var(--c-text-muted);
  text-align: left; background: transparent;
  border-bottom: 1px solid var(--c-border-subtle);
}
.task-table thead th:first-child { padding-left: 40px; }
.task-table tbody tr { height: 40px; border-bottom: 1px solid var(--c-border-subtle); cursor: pointer; transition: background .1s; }
.task-table tbody tr:last-child { border-bottom: none; }
.task-table tbody tr:hover { background: var(--c-primary-surf); }
.task-table tbody td { padding: 8px 12px; font-size: 14px; color: var(--c-text); vertical-align: middle; }
.task-table tbody td:first-child { padding-left: 0; }
.task-indent { display: inline-flex; align-items: center; gap: 0; padding-left: 16px; }
.task-indent-line {
  display: inline-block; width: 16px; height: 16px;
  border-left: 2px solid var(--c-border); border-bottom: 2px solid var(--c-border);
  margin-right: 8px; flex-shrink: 0;
}
.task-name-cell { font-weight: 500; }
.task-sub { font-size: 12px; color: var(--c-text-muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 240px; }
.overdue-text { color: var(--c-danger) !important; font-weight: 700; }

/* Standalone tasks card */
.standalone-card {
  background: var(--c-white);
  border: 1px solid var(--c-border);
  border-radius: var(--r-card);
  box-shadow: var(--sh-card);
  overflow: hidden;
}
.standalone-task-table { width: 100%; border-collapse: collapse; }
.standalone-task-table thead th {
  padding: 8px 12px;
  font-size: 12px; font-weight: 700; color: var(--c-text-section);
  background: var(--c-bg-table-hd);
  border-bottom: 1px solid var(--c-border);
  text-align: left;
}
.standalone-task-table tbody tr { height: 40px; border-bottom: 1px solid var(--c-border-subtle); cursor: pointer; transition: background .1s; }
.standalone-task-table tbody tr:last-child { border-bottom: none; }
.standalone-task-table tbody tr:hover { background: var(--c-bg-hover); }
.standalone-task-table tbody td { padding: 8px 12px; font-size: 14px; color: var(--c-text); vertical-align: middle; }

/* ─────────────────────────────────────────
   CONTRACT DETAIL
───────────────────────────────────────── */
.contract-detail-card {
  background: var(--c-white);
  border: 1px solid var(--c-border);
  border-radius: var(--r-card);
  box-shadow: var(--sh-card);
  padding: 16px;
  margin-bottom: 24px;
}
.contract-detail-type { font-size: 12px; font-weight: 700; color: var(--c-primary); margin-bottom: 4px; }
.contract-detail-title { font-size: 18px; font-weight: 700; color: var(--c-text); margin-bottom: 16px; }
.contract-meta-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 16px; }
.divider { border: none; border-top: 1px solid var(--c-border-subtle); margin: 16px 0; }
.contract-summary { background: var(--c-bg-page); border-radius: var(--r-control); padding: 12px 14px; }
.contract-summary p { font-size: 13px; color: var(--c-text-section); line-height: 1.7; }

/* ─────────────────────────────────────────
   TASK DRAWER (Right slide-in sidebar)
   width: 360px | viewport full height
───────────────────────────────────────── */
.drawer-overlay {
  position: fixed; inset: 0; background: rgba(20,29,61,.24);
  z-index: 100; opacity: 0; pointer-events: none; transition: opacity .2s;
}
.drawer-overlay.is-open { opacity: 1; pointer-events: auto; }
.task-drawer {
  position: fixed; top: 0; right: -360px; width: 360px; height: 100vh;
  background: var(--c-white);
  border-left: 1px solid var(--c-border);
  box-shadow: var(--sh-overlay);
  z-index: 101;
  display: flex; flex-direction: column;
  transition: right .24s cubic-bezier(.4,0,.2,1);
}
.task-drawer.is-open { right: 0; }
.drawer-header {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 20px 16px 14px;
  border-bottom: 1px solid var(--c-border-subtle);
  flex-shrink: 0;
}
.drawer-header-meta { flex: 1; }
.drawer-label { font-size: 12px; font-weight: 700; color: var(--c-text-muted); margin-bottom: 4px; }
.drawer-title { font-size: 16px; font-weight: 700; color: var(--c-text); line-height: 24px; }
.drawer-close-btn {
  display: inline-flex; align-items: center; justify-content: center;
  width: 28px; height: 28px; border-radius: var(--r-control);
  background: var(--c-bg-page); color: var(--c-text-muted);
  flex-shrink: 0; transition: background .1s;
}
.drawer-close-btn:hover { background: var(--c-bg-hover); color: var(--c-text); }
.drawer-body { flex: 1; overflow-y: auto; padding: 0; }
.drawer-section { padding: 16px; border-bottom: 1px solid var(--c-border-subtle); }
.drawer-section:last-child { border-bottom: none; }
.drawer-section-title {
  font-size: 12px; font-weight: 700; color: var(--c-text-muted);
  text-transform: uppercase; letter-spacing: .04em;
  margin-bottom: 12px;
}
.drawer-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.drawer-field { display: flex; flex-direction: column; gap: 4px; }
.drawer-field.full { grid-column: 1 / -1; }
.drawer-field-label { font-size: 12px; font-weight: 700; color: var(--c-text-muted); }
.drawer-field-value { font-size: 14px; font-weight: 500; color: var(--c-text); }
.drawer-field-value.body { font-weight: 400; color: var(--c-text-section); line-height: 1.6; }
.drawer-footer { padding: 14px 16px; border-top: 1px solid var(--c-border-subtle); flex-shrink: 0; }
.btn-contract-jump {
  width: 100%; display: flex; align-items: center; justify-content: center; gap: 6px;
  height: 36px; border-radius: 18px;
  background: var(--c-primary-surf); color: var(--c-primary);
  border: 1px solid var(--c-primary-pale);
  font-size: 12px; font-weight: 700; cursor: pointer;
  transition: background .15s;
}
.btn-contract-jump:hover { background: var(--c-primary-pale); }

/* ─────────────────────────────────────────
   EMPTY STATE
───────────────────────────────────────── */
.empty-state { padding: 40px 16px; text-align: center; }
.empty-state .material-symbols-rounded { font-size: 36px; color: var(--c-text-muted); opacity: .4; margin-bottom: 10px; display: block; }
.empty-state p { font-size: 13px; color: var(--c-text-muted); }

/* ─────────────────────────────────────────
   SCROLLBAR
───────────────────────────────────────── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }

<div class="app-shell">

          <div class="filter-field">

          </div>
          <div class="filter-field">
            <label class="filter-label" for="f-assignee">担当者</label>

              <option>田中 健一</option>

              <option>山本 遼</option>
              <option>鈴木 花子</option>

              <option value="closed">完了</option>

                  <th>担当者</th>
                  <th>開始日</th>
                  <th>ステータス</th>
                  <th>タスク進捗</th>
                </tr>
              </thead>
              <tbody id="project-tbody"></tbody>

        </div>

                  <th>期限</th>

              <tbody id="standalone-tbody"></tbody>
            </table>
          </div>

// ─────────────────────────────────────────
const STATUS_CONFIG = {
  active:  { label:'進行中',    cls:'badge-success' },
  pending: { label:'保留中',    cls:'badge-warning' },
  review:  { label:'レビュー中', cls:'badge-info' },
  closed:  { label:'完了',      cls:'badge-neutral' },
};
const TASK_STATUS_CONFIG = {
  done:     { label:'完了',    cls:'badge-success' },
  progress: { label:'進行中',  cls:'badge-info' },
  todo:     { label:'未着手',  cls:'badge-neutral' },
  overdue:  { label:'期限超過', cls:'badge-danger' },
};
const TODAY = '2026-03-19';

// ─────────────────────────────────────────
// UTILITIES
// ─────────────────────────────────────────
function fmtDate(d) { return d ? d.replace(/-/g, '/') : '—'; }
function badge(status, cfg) {
  const c = cfg[status] || { label: status, cls: '' };
  return `<span class="badge ${c.cls}">${c.label}</span>`;
}
function resolveTaskStatus(t) {
  if (t.status === 'done') return 'done';
  if (t.dueDate < TODAY)   return 'overdue';
  return t.status;
}
function progressBar(done, total) {
  const pct = total ? Math.round(done / total * 100) : 0;
  return `<div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <span class="progress-label">${done}/${total}</span>
  </div>`;
}

// ─────────────────────────────────────────
// STATE
// ─────────────────────────────────────────
let filteredProjects = [...projects];
let currentProjectId = null;
let currentContractId = null;
let currentTaskId = null;
let sidebarOpen = true;

// ─────────────────────────────────────────
// SIDEBAR TOGGLE
// ─────────────────────────────────────────
function toggleSidebar() {
  const sb = document.getElementById('filterSidebar');
  const icon = document.getElementById('toggleIcon');
  const label = document.getElementById('toggleLabel');
  sidebarOpen = !sidebarOpen;
  sb.classList.toggle('collapsed', !sidebarOpen);
  icon.textContent  = sidebarOpen ? 'chevron_left' : 'chevron_right';
  label.textContent = sidebarOpen ? '閉じる' : '';
}

// ─────────────────────────────────────────
// NAVIGATION
// ─────────────────────────────────────────
function goPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('is-active'));
  document.getElementById('page-' + name).classList.add('is-active');
  document.getElementById('mainContent').scrollTop = 0;
  closeDrawer();
}

// ─────────────────────────────────────────
// LIST PAGE
// ─────────────────────────────────────────
function renderList() {
  const tbody = document.getElementById('project-tbody');
  const countEl = document.getElementById('list-count');
  countEl.innerHTML = `<strong>${filteredProjects.length}</strong> 件の案件`;
  if (!filteredProjects.length) {
    tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><span class="material-symbols-rounded">inbox</span><p>条件に一致する案件がありません</p></div></td></tr>`;
    return;
  }
  tbody.innerHTML = filteredProjects.map(p =>
    `<tr onclick="openProject(${p.id})">
      <td><div class="cell-primary">${p.name}</div></td>
      <td>${p.client}</td>
      <td>${p.assignee}</td>
      <td style="text-align:right;">${fmtDate(p.startDate)}</td>
      <td>${badge(p.status, STATUS_CONFIG)}</td>
      <td>${progressBar(p.tasksDone, p.tasksTotal)}</td>
    </tr>`
  ).join('');
}

function applyFilter() {
  const name     = document.getElementById('f-name').value.toLowerCase();
  const client   = document.getElementById('f-client').value.toLowerCase();
  const date     = document.getElementById('f-date').value;
  const assignee = document.getElementById('f-assignee').value;
  const status   = document.getElementById('f-status').value;
  filteredProjects = projects.filter(p => {
    if (name     && !p.name.toLowerCase().includes(name))     return false;
    if (client   && !p.client.toLowerCase().includes(client)) return false;
    if (date     && p.startDate < date)                        return false;
    if (assignee && p.assignee !== assignee)                   return false;
    if (status   && p.status !== status)                       return false;
    return true;
  });
  renderList();
}

function clearFilter() {
  ['f-name','f-client','f-date'].forEach(id => document.getElementById(id).value = '');
  ['f-assignee','f-status'].forEach(id => document.getElementById(id).value = '');
  filteredProjects = [...projects];
  renderList();
}

// ─────────────────────────────────────────
// DETAIL PAGE
// ─────────────────────────────────────────
function openProject(id) {
  currentProjectId = id;
  const p = projects.find(x => x.id === id);
  goPage('detail');
  document.getElementById('detail-breadcrumb').textContent = p.name;
  document.getElementById('detail-title').textContent = p.name;
  document.getElementById('detail-status-badge').innerHTML = badge(p.status, STATUS_CONFIG);
  const pct = p.tasksTotal ? Math.round(p.tasksDone / p.tasksTotal * 100) : 0;
  document.getElementById('detail-meta').innerHTML = `
    <div class="meta-item"><div class="meta-label">取引先</div><div class="meta-value">${p.client}</div></div>
    <div class="meta-item"><div class="meta-label">開始日</div><div class="meta-value">${fmtDate(p.startDate)}</div></div>
    <div class="meta-item"><div class="meta-label">担当者</div><div class="meta-value">${p.assignee}</div></div>
    <div class="meta-item"><div class="meta-label">タスク進捗</div><div class="meta-value">${p.tasksDone} / ${p.tasksTotal}（${pct}%）</div></div>
  `;

  // Contracts with tasks
  const projectContracts = contracts.filter(c => c.projectId === id);
  document.getElementById('contract-count').textContent = projectContracts.length;
  const contractList = document.getElementById('contract-list');
  if (!projectContracts.length) {
    contractList.innerHTML = `<div class="empty-state"><span class="material-symbols-rounded">description</span><p>契約書がありません</p></div>`;
  } else {
    contractList.innerHTML = projectContracts.map(c => {
      const ctasks = tasks.filter(t => t.contractId === c.id);
      const doneCnt = ctasks.filter(t => t.status === 'done').length;
      const taskRows = ctasks.map(t => {
        const st = resolveTaskStatus(t);
        const isOver = st === 'overdue';
        return `<tr onclick="openTaskDrawer(${t.id})">
          <td>
            <div class="task-indent">
              <span class="task-indent-line"></span>
              <div>
                <div class="task-name-cell">${t.name}</div>
                <div class="task-sub">${t.summary.slice(0,36)}…</div>
              </div>
            </div>
          </td>
          <td>${t.assignee}</td>
          <td style="text-align:right;">${fmtDate(t.startDate)}</td>
          <td style="text-align:right;" class="${isOver ? 'overdue-text' : ''}">${fmtDate(t.dueDate)}</td>
          <td>${badge(st, TASK_STATUS_CONFIG)}</td>
        </tr>`;
      }).join('');
      return `<div class="contract-card" id="cc-${c.id}">
        <div class="contract-card-header" onclick="toggleContract(${c.id})">
          <span class="material-symbols-rounded contract-chevron">chevron_right</span>
          <div class="contract-name">
            <span class="material-symbols-rounded contract-icon">description</span>${c.name}
          </div>
          <div class="contract-header-meta">
            <span class="contract-meta-text">${fmtDate(c.start)} 〜 ${fmtDate(c.end)}</span>
            <span class="count-badge" style="font-size:11px;">${doneCnt}/${ctasks.length}</span>
          </div>
        </div>
        <div class="contract-tasks-body">
          <table class="task-table">
            <thead><tr>
              <th style="padding-left:40px;">タスク名</th><th>担当者</th>
              <th style="text-align:right;">開始日</th><th style="text-align:right;">期限</th><th>ステータス</th>
            </tr></thead>
            <tbody>${taskRows}</tbody>
          </table>
        </div>
      </div>`;
    }).join('');
  }

  // Standalone tasks
  const standalone = tasks.filter(t => t.projectId === id && t.contractId === null);
  document.getElementById('standalone-count').textContent = standalone.length;
  const stb = document.getElementById('standalone-tbody');
  if (!standalone.length) {
    stb.innerHTML = `<tr><td colspan="5"><div class="empty-state"><span class="material-symbols-rounded">task_alt</span><p>契約書に紐づかないタスクはありません</p></div></td></tr>`;
  } else {
    stb.innerHTML = standalone.map(t => {
      const st = resolveTaskStatus(t);
      const isOver = st === 'overdue';
      return `<tr onclick="openTaskDrawer(${t.id})">
        <td><div style="font-weight:500;">${t.name}</div><div class="task-sub">${t.summary.slice(0,40)}…</div></td>
        <td>${t.assignee}</td>
        <td style="text-align:right;">${fmtDate(t.startDate)}</td>
        <td style="text-align:right;" class="${isOver ? 'overdue-text' : ''}">${fmtDate(t.dueDate)}</td>
        <td>${badge(st, TASK_STATUS_CONFIG)}</td>
      </tr>`;
    }).join('');
  }
}

function toggleContract(cid) {
  document.getElementById('cc-' + cid).classList.toggle('is-open');
}

// ─────────────────────────────────────────
// TASK DRAWER
// ─────────────────────────────────────────
function openTaskDrawer(tid) {
  currentTaskId = tid;
  const t = tasks.find(x => x.id === tid);
  const st = resolveTaskStatus(t);
  document.getElementById('drawerTitle').textContent = t.name;
  document.getElementById('d-assignee').textContent  = t.assignee;
  document.getElementById('d-status').innerHTML = badge(st, TASK_STATUS_CONFIG);
  document.getElementById('d-start').textContent = fmtDate(t.startDate);
  document.getElementById('d-due').textContent   = fmtDate(t.dueDate);
  document.getElementById('d-summary').textContent = t.summary;

  const cs = document.getElementById('d-contract-section');
  const ft = document.getElementById('d-footer');
  if (t.contractId) {
    const c = contracts.find(x => x.id === t.contractId);
    cs.hidden = false; ft.hidden = false;
    document.getElementById('d-contract-name').textContent   = c.name;
    document.getElementById('d-contract-type').textContent   = c.type;
    document.getElementById('d-contract-period').textContent = `${fmtDate(c.start)} 〜 ${fmtDate(c.end)}`;
  } else {
    cs.hidden = true; ft.hidden = true;
  }

  document.getElementById('taskDrawer').classList.add('is-open');
  document.getElementById('drawerOverlay').classList.add('is-open');
}

function closeDrawer() {
  document.getElementById('taskDrawer').classList.remove('is-open');
  document.getElementById('drawerOverlay').classList.remove('is-open');
}

// ─────────────────────────────────────────
// CONTRACT DETAIL PAGE
// ─────────────────────────────────────────
function openContractFromDrawer() {
  const t = tasks.find(x => x.id === currentTaskId);
  if (!t || !t.contractId) return;
  currentContractId = t.contractId;
  closeDrawer();
  openContractPage(t.contractId);
}

function openContractPage(cid) {
  const c = contracts.find(x => x.id === cid);
  goPage('contract');
  document.getElementById('contract-breadcrumb').textContent = c.name;
  document.getElementById('cd-type').textContent   = c.type;
  document.getElementById('cd-title').textContent  = c.name;
  document.getElementById('cd-summary').textContent = c.summary;
  document.getElementById('cd-meta').innerHTML = `
    <div class="meta-item"><div class="meta-label">相手方</div><div class="meta-value">${c.party}</div></div>
    <div class="meta-item"><div class="meta-label">契約開始日</div><div class="meta-value">${fmtDate(c.start)}</div></div>
    <div class="meta-item"><div class="meta-label">契約終了日</div><div class="meta-value">${fmtDate(c.end)}</div></div>
  `;
  const ctasks = tasks.filter(t => t.contractId === cid);
  document.getElementById('contract-task-count').textContent = ctasks.length;
  const tb = document.getElementById('contract-task-tbody');
  if (!ctasks.length) {
    tb.innerHTML = `<tr><td colspan="5"><div class="empty-state"><span class="material-symbols-rounded">checklist</span><p>タスクがありません</p></div></td></tr>`;
  } else {
    tb.innerHTML = ctasks.map(t => {
      const st = resolveTaskStatus(t);
      const isOver = st === 'overdue';
      return `<tr onclick="openTaskDrawer(${t.id})">
        <td><div style="font-weight:500;">${t.name}</div><div class="task-sub">${t.summary.slice(0,40)}…</div></td>
        <td>${t.assignee}</td>
        <td style="text-align:right;">${fmtDate(t.startDate)}</td>
        <td style="text-align:right;" class="${isOver ? 'overdue-text' : ''}">${fmtDate(t.dueDate)}</td>
        <td>${badge(st, TASK_STATUS_CONFIG)}</td>
      </tr>`;
    }).join('');
  }
}

// ─────────────────────────────────────────
// INIT
// ─────────────────────────────────────────
renderList();
</script>
</body>
</html>
