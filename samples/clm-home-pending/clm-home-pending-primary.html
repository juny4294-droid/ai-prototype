<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ContractS CLM — ホーム（未対応優先）</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0"
      rel="stylesheet"
    />
    <style>
      :root {
        --nav-bg: #141d3d;
        --nav-active: #314574;
        --nav-divider: rgba(255, 255, 255, 0.16);
        --text-inverse: #ffffff;
        --icon-muted: rgba(255, 255, 255, 0.84);
        --brand-primary: #00aa9c;
        --brand-dark: #008479;
        --page-bg: #f8fafc;
        --text-strong: #353947;
        --text-section: #73767f;
        --text-muted: #a8adba;
        --border-input: #e4e7ed;
        --table-header: #fcfdfe;
        --danger: #e64c5b;
        --danger-subtle: #fdedee;
        --warning-bg: #fff9e0;
        --radius: 6px;
        --shadow-card: 0 1px 2px rgba(20, 29, 61, 0.06);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Noto Sans JP", sans-serif;
        font-size: 14px;
        line-height: 1.43;
        color: var(--text-strong);
        background: var(--page-bg);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .material-symbols-rounded {
        font-size: 22px;
        font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
        vertical-align: middle;
        line-height: 1;
      }

      /* Navbar — components/navbar.md */
      .navbar {
        display: flex;
        align-items: center;
        height: 48px;
        padding: 0 16px;
        background: var(--nav-bg);
        color: var(--text-inverse);
        flex-shrink: 0;
        gap: 0;
      }

      .navbar__product {
        display: flex;
        align-items: center;
        gap: 8px;
        padding-right: 12px;
        border-right: 1px solid var(--nav-divider);
        margin-right: 12px;
      }

      .navbar__logo {
        width: 32px;
        height: 32px;
        border: 1px solid rgba(255, 255, 255, 0.35);
        border-radius: var(--radius);
        display: flex;
        align-items: center;
        justify-content: center;
        background: transparent;
        color: var(--text-inverse);
        cursor: pointer;
        padding: 0;
      }

      .navbar__company {
        font-size: 13px;
        font-weight: 500;
        white-space: nowrap;
      }

      .navbar__caret {
        opacity: 0.75;
        font-size: 18px !important;
      }

      .navbar__nav {
        display: flex;
        align-items: center;
        gap: 4px;
        flex: 1;
        min-width: 0;
      }

      .navbar__link {
        color: var(--text-inverse);
        text-decoration: none;
        padding: 8px 12px;
        border-radius: var(--radius);
        font-size: 13px;
        white-space: nowrap;
      }

      .navbar__link:hover {
        background: rgba(255, 255, 255, 0.08);
      }

      .navbar__link--active {
        background: var(--nav-active);
      }

      .navbar__utils {
        display: flex;
        align-items: center;
        gap: 4px;
        margin-left: auto;
      }

      .navbar__icon-btn {
        width: 36px;
        height: 36px;
        border: none;
        background: transparent;
        color: var(--icon-muted);
        border-radius: var(--radius);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
      }

      .navbar__icon-btn:hover {
        color: var(--text-inverse);
        background: rgba(255, 255, 255, 0.08);
      }

      .navbar__avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        border: 1px solid rgba(255, 255, 255, 0.4);
        display: flex;
        align-items: center;
        justify-content: center;
        margin-left: 4px;
        color: var(--icon-muted);
        background: rgba(255, 255, 255, 0.06);
      }

      .page {
        flex: 1;
        padding: 24px 28px 80px;
        max-width: 1200px;
        width: 100%;
        margin: 0 auto;
      }

      .page-header {
        display: flex;
        flex-wrap: wrap;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 20px;
      }

      .page-header__titles h1 {
        margin: 0 0 4px;
        font-size: 20px;
        font-weight: 700;
        line-height: 1.35;
      }

      .page-header__titles p {
        margin: 0;
        font-size: 13px;
        color: var(--text-section);
      }

      .btn-primary {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 10px 20px;
        font-size: 14px;
        font-weight: 700;
        font-family: inherit;
        color: #fff;
        background: var(--brand-primary);
        border: none;
        border-radius: var(--radius);
        cursor: pointer;
        box-shadow: var(--shadow-card);
      }

      .btn-primary:hover:not(:disabled) {
        background: var(--brand-dark);
      }

      .btn-primary:focus-visible {
        outline: 2px solid var(--brand-primary);
        outline-offset: 2px;
      }

      .btn-primary:disabled {
        opacity: 0.45;
        cursor: not-allowed;
        box-shadow: none;
      }

      .summary {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-bottom: 20px;
      }

      .summary__item {
        display: flex;
        align-items: baseline;
        gap: 8px;
        padding: 10px 14px;
        background: #fff;
        border: 1px solid var(--border-input);
        border-radius: var(--radius);
        box-shadow: var(--shadow-card);
        cursor: pointer;
        font: inherit;
        color: inherit;
        text-align: left;
      }

      .summary__item:hover {
        border-color: var(--brand-primary);
      }

      .summary__item:focus-visible {
        outline: 2px solid var(--brand-primary);
        outline-offset: 1px;
      }

      .summary__label {
        font-size: 12px;
        color: var(--text-section);
      }

      .summary__value {
        font-size: 18px;
        font-weight: 700;
        color: var(--text-strong);
      }

      .summary__value--danger {
        color: var(--danger);
      }

      .layout {
        display: grid;
        grid-template-columns: 1fr 220px;
        gap: 24px;
        align-items: start;
      }

      @media (max-width: 900px) {
        .layout {
          grid-template-columns: 1fr;
        }
      }

      .panel {
        background: #fff;
        border: 1px solid var(--border-input);
        border-radius: 8px;
        box-shadow: var(--shadow-card);
        overflow: hidden;
      }

      .panel__head {
        padding: 14px 16px;
        border-bottom: 1px solid var(--border-input);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
      }

      .panel__head h2 {
        margin: 0;
        font-size: 14px;
        font-weight: 700;
      }

      .panel__head p {
        margin: 4px 0 0;
        font-size: 12px;
        color: var(--text-section);
      }

      .filter-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
      }

      .filter-chip {
        font-size: 12px;
        padding: 4px 10px;
        border-radius: 999px;
        border: 1px solid var(--border-input);
        background: #fff;
        cursor: pointer;
        font-family: inherit;
        color: var(--text-section);
      }

      .filter-chip--on {
        border-color: var(--brand-primary);
        background: #dff3f1;
        color: var(--brand-dark);
        font-weight: 700;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }

      th {
        text-align: left;
        padding: 10px 16px;
        background: var(--table-header);
        color: var(--text-section);
        font-weight: 500;
        border-bottom: 1px solid var(--border-input);
        white-space: nowrap;
      }

      td {
        padding: 12px 16px;
        border-bottom: 1px solid var(--border-input);
        vertical-align: top;
      }

      tr:last-child td {
        border-bottom: none;
      }

      tbody tr {
        cursor: pointer;
      }

      tbody tr:hover {
        background: #f8fafc;
      }

      tbody tr.is-focused {
        outline: 2px solid var(--brand-primary);
        outline-offset: -2px;
        background: #f1fafb;
      }

      .cell-title {
        font-weight: 500;
        color: var(--text-strong);
      }

      .cell-meta {
        font-size: 12px;
        color: var(--text-section);
        margin-top: 2px;
      }

      .badge {
        display: inline-block;
        font-size: 11px;
        font-weight: 700;
        padding: 2px 8px;
        border-radius: 4px;
        white-space: nowrap;
      }

      .badge--attention {
        background: var(--danger-subtle);
        color: var(--danger);
      }

      .badge--due {
        background: var(--warning-bg);
        color: #6b5900;
      }

      .badge--neutral {
        background: var(--table-header);
        color: var(--text-section);
      }

      .support {
        font-size: 12px;
      }

      .support h3 {
        margin: 0 0 8px;
        font-size: 12px;
        font-weight: 700;
        color: var(--text-section);
      }

      .support ul {
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .support li {
        margin-bottom: 6px;
      }

      .support a {
        color: var(--brand-primary);
        text-decoration: none;
        font-weight: 500;
      }

      .support a:hover {
        text-decoration: underline;
      }

      .support p {
        margin: 12px 0 0;
        color: var(--text-muted);
        line-height: 1.5;
      }

      .empty-block,
      .error-block {
        padding: 40px 24px;
        text-align: center;
      }

      .empty-block p,
      .error-block p {
        margin: 0 0 12px;
        color: var(--text-section);
        font-size: 13px;
      }

      .error-block {
        background: var(--danger-subtle);
      }

      .error-block p {
        color: var(--danger);
        font-weight: 500;
      }

      .btn-ghost {
        font-size: 13px;
        padding: 8px 14px;
        border: 1px solid var(--border-input);
        background: #fff;
        border-radius: var(--radius);
        cursor: pointer;
        font-family: inherit;
      }

      .skeleton {
        animation: sk 1.2s ease-in-out infinite;
        background: linear-gradient(
          90deg,
          #eef1f6 0%,
          #f5f7fa 50%,
          #eef1f6 100%
        );
        background-size: 200% 100%;
        border-radius: 4px;
        height: 14px;
      }

      @keyframes sk {
        0% {
          background-position: 100% 0;
        }
        100% {
          background-position: -100% 0;
        }
      }

      .prototype-footnote {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 8px 16px;
        background: #fff;
        border-top: 1px solid var(--border-input);
        font-size: 11px;
        color: var(--text-muted);
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px 16px;
        z-index: 10;
      }

      .prototype-footnote label {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        cursor: pointer;
      }

      .live-region {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        border: 0;
      }
    </style>
  </head>
  <body>
    <header class="navbar" aria-label="グローバルナビゲーション">
      <div class="navbar__product">
        <button type="button" class="navbar__logo" aria-label="テナントメニュー">
          <span class="material-symbols-rounded">domain</span>
        </button>
        <span class="navbar__company">【社内】ContractS株式会社</span>
        <span class="material-symbols-rounded navbar__caret" aria-hidden="true"
          >expand_more</span
        >
      </div>
      <nav class="navbar__nav" aria-label="主要メニュー">
        <a class="navbar__link navbar__link--active" href="#">ホーム</a>
        <a class="navbar__link" href="#">チャネル</a>
        <a class="navbar__link" href="#">プロジェクト</a>
        <a class="navbar__link" href="#">契約管理</a>
        <a class="navbar__link" href="#">案件管理</a>
      </nav>
      <div class="navbar__utils">
        <button type="button" class="navbar__icon-btn" aria-label="ヘルプ">
          <span class="material-symbols-rounded">help</span>
        </button>
        <button type="button" class="navbar__icon-btn" aria-label="検索">
          <span class="material-symbols-rounded">search</span>
        </button>
        <button type="button" class="navbar__icon-btn" aria-label="アカウント">
          <span class="material-symbols-rounded">alternate_email</span>
        </button>
        <button type="button" class="navbar__icon-btn" aria-label="通知">
          <span class="material-symbols-rounded">notifications</span>
        </button>
        <div class="navbar__avatar" aria-hidden="true">
          <span class="material-symbols-rounded">person</span>
        </div>
      </div>
    </header>

    <main class="page" id="main">
      <div class="page-header">
        <div class="page-header__titles">
          <h1>ホーム</h1>
          <p>未対応の契約・タスクを優先して処理できます。</p>
        </div>
        <button
          type="button"
          class="btn-primary"
          id="btnProcessPending"
          title="未対応の一覧へスクロールし、先頭項目を強調します"
        >
          <span class="material-symbols-rounded" style="font-size: 20px"
            >pending_actions</span
          >
          未対応を処理する
        </button>
      </div>

      <section class="summary" id="summary" aria-label="要約"></section>

      <div class="layout">
        <div class="panel" id="queuePanel">
          <div class="panel__head">
            <div>
              <h2 id="queueTitle">自分のワークキュー</h2>
              <p id="queueDesc">期限とステータスに応じて並んでいます。</p>
            </div>
            <div class="filter-row" id="filterRow" hidden></div>
          </div>
          <div id="tableHost"></div>
        </div>
        <aside class="support panel" style="padding: 14px 16px" aria-label="ショートカット">
          <h3>よく使う導線</h3>
          <ul>
            <li><a href="#">契約一覧へ</a></li>
            <li><a href="#">案件一覧へ</a></li>
            <li><a href="#">プロジェクト一覧へ</a></li>
          </ul>
          <p>メインの作業は左のキューで完結させ、ここは補助のリンクのみにしています。</p>
        </aside>
      </div>
    </main>

    <div class="prototype-footnote" aria-hidden="false">
      <span>プロトタイプ：表示状態</span>
      <label
        ><input type="radio" name="uiState" value="default" checked /> 通常</label
      >
      <label><input type="radio" name="uiState" value="loading" /> 読込中</label>
      <label><input type="radio" name="uiState" value="empty" /> 空</label>
      <label><input type="radio" name="uiState" value="error" /> エラー</label>
      <label
        ><input type="radio" name="uiState" value="disabled" /> 操作不可</label
      >
    </div>

    <div class="live-region" id="live" aria-live="polite"></div>

    <script>
      (function () {
        const ROWS = [
          {
            kind: "契約",
            title: "購買基本契約書（改定版）",
            meta: "契約管理 / 承認待ち",
            due: "期限: あと2日",
            badge: "承認待ち",
            badgeVariant: "attention",
            filter: "approval",
          },
          {
            kind: "契約",
            title: "秘密保持契約（テンプレートA）",
            meta: "契約管理 / 差戻しあり",
            due: "期限: あと5日",
            badge: "差戻し",
            badgeVariant: "attention",
            filter: "returned",
          },
          {
            kind: "案件",
            title: "新規取引先オンボーディング",
            meta: "案件管理 / タスク未完了",
            due: "期限: 今日",
            badge: "期限接近",
            badgeVariant: "due",
            filter: "due",
          },
          {
            kind: "契約",
            title: "ライセンス契約（自動更新条項）",
            meta: "契約管理 / レビュー中",
            due: "期限: あと14日",
            badge: "レビュー中",
            badgeVariant: "neutral",
            filter: "other",
          },
        ];

        const summaryConfig = [
          { key: "approval", label: "承認待ち", value: 2, danger: true },
          { key: "due", label: "期限7日以内", value: 1, danger: false },
          { key: "returned", label: "差戻し", value: 1, danger: true },
        ];

        let uiState = "default";
        let activeFilter = null;

        const els = {
          summary: document.getElementById("summary"),
          tableHost: document.getElementById("tableHost"),
          filterRow: document.getElementById("filterRow"),
          queueTitle: document.getElementById("queueTitle"),
          queueDesc: document.getElementById("queueDesc"),
          btn: document.getElementById("btnProcessPending"),
          live: document.getElementById("live"),
        };

        function announce(msg) {
          els.live.textContent = "";
          requestAnimationFrame(function () {
            els.live.textContent = msg;
          });
        }

        function filteredRows() {
          if (!activeFilter) return ROWS.slice();
          return ROWS.filter(function (r) {
            return r.filter === activeFilter;
          });
        }

        function renderSummary() {
          els.summary.innerHTML = "";
          if (uiState === "loading") {
            for (let i = 0; i < 3; i++) {
              const d = document.createElement("div");
              d.className = "summary__item";
              d.style.cursor = "default";
              d.innerHTML =
                '<span class="summary__label skeleton" style="width:72px"></span><span class="summary__value skeleton" style="width:32px;height:22px"></span>';
              els.summary.appendChild(d);
            }
            return;
          }
          if (uiState === "empty") {
            const d = document.createElement("div");
            d.className = "summary__item";
            d.style.cursor = "default";
            d.innerHTML =
              '<span class="summary__label">未対応</span><span class="summary__value">0</span>';
            els.summary.appendChild(d);
            return;
          }
          if (uiState === "error") {
            const d = document.createElement("div");
            d.className = "summary__item";
            d.style.cursor = "default";
            d.innerHTML =
              '<span class="summary__label">要約</span><span class="summary__value">—</span>';
            els.summary.appendChild(d);
            return;
          }

          summaryConfig.forEach(function (c) {
            const btn = document.createElement("button");
            btn.type = "button";
            btn.className = "summary__item";
            btn.dataset.filter = c.key;
            btn.innerHTML =
              '<span class="summary__label">' +
              c.label +
              '</span><span class="summary__value' +
              (c.danger ? " summary__value--danger" : "") +
              '">' +
              c.value +
              "</span>";
            if (uiState === "disabled") {
              btn.disabled = true;
              btn.style.opacity = "0.55";
              btn.style.cursor = "not-allowed";
            } else {
              btn.addEventListener("click", function () {
                activeFilter = c.key;
                renderFilters();
                renderTable();
                announce(c.label + "で絞り込みました。");
                document.getElementById("queuePanel").scrollIntoView({
                  behavior: "smooth",
                  block: "start",
                });
              });
            }
            els.summary.appendChild(btn);
          });
        }

        function renderFilters() {
          els.filterRow.hidden =
            uiState !== "default" || activeFilter === null;
          if (els.filterRow.hidden) {
            els.filterRow.innerHTML = "";
            return;
          }
          const labels = { approval: "承認待ち", due: "期限7日以内", returned: "差戻し" };
          const chip = document.createElement("button");
          chip.type = "button";
          chip.className = "filter-chip filter-chip--on";
          chip.textContent = labels[activeFilter] + "で絞り込み";
          chip.addEventListener("click", function () {
            activeFilter = null;
            renderFilters();
            renderTable();
            announce("絞り込みを解除しました。");
          });
          els.filterRow.appendChild(chip);
        }

        function renderTable() {
          els.tableHost.innerHTML = "";

          if (uiState === "loading") {
            const wrap = document.createElement("div");
            wrap.style.padding = "16px";
            for (let r = 0; r < 5; r++) {
              const row = document.createElement("div");
              row.style.display = "flex";
              row.style.gap = "12px";
              row.style.marginBottom = "12px";
              row.innerHTML =
                '<div class="skeleton" style="flex:0 0 48px;height:36px"></div><div style="flex:1"><div class="skeleton" style="width:60%;margin-bottom:8px"></div><div class="skeleton" style="width:40%"></div></div>';
              wrap.appendChild(row);
            }
            els.tableHost.appendChild(wrap);
            return;
          }

          if (uiState === "empty") {
            const box = document.createElement("div");
            box.className = "empty-block";
            box.innerHTML =
              "<p>未対応の項目はありません。</p><button type=\"button\" class=\"btn-ghost\" id=\"goList\">契約一覧へ</button>";
            els.tableHost.appendChild(box);
            document.getElementById("goList")?.addEventListener("click", function () {
              announce("契約一覧へ遷移する想定です。");
            });
            return;
          }

          if (uiState === "error") {
            const box = document.createElement("div");
            box.className = "error-block";
            box.innerHTML =
              '<p>ワークキューを読み込めませんでした。</p><button type="button" class="btn-ghost" id="retryQueue">再試行</button>';
            els.tableHost.appendChild(box);
            document.getElementById("retryQueue")?.addEventListener("click", function () {
              uiState = "default";
              syncRadios();
              fullRender();
              announce("再読み込みしました。");
            });
            return;
          }

          const rows = filteredRows();
          const table = document.createElement("table");
          table.innerHTML =
            "<thead><tr><th>種別</th><th>件名 / 文脈</th><th>期限</th><th>状態</th></tr></thead>";
          const tb = document.createElement("tbody");
          rows.forEach(function (r, idx) {
            const tr = document.createElement("tr");
            tr.dataset.rowIndex = String(idx);
            tr.tabIndex = -1;
            tr.innerHTML =
              "<td>" +
              r.kind +
              '</td><td><div class="cell-title">' +
              r.title +
              '</div><div class="cell-meta">' +
              r.meta +
              "</div></td><td>" +
              r.due +
              '</td><td><span class="badge badge--' +
              r.badgeVariant +
              '">' +
              r.badge +
              "</span></td>";
            if (uiState === "disabled") {
              tr.style.opacity = "0.55";
              tr.style.cursor = "not-allowed";
            } else {
              tr.addEventListener("click", function () {
                announce("詳細画面へ遷移する想定です。");
              });
            }
            tb.appendChild(tr);
          });
          table.appendChild(tb);
          els.tableHost.appendChild(table);
        }

        function focusFirstPendingRow() {
          const tr = els.tableHost.querySelector("tbody tr");
          if (!tr) return;
          els.tableHost.querySelectorAll("tbody tr").forEach(function (r) {
            r.classList.remove("is-focused");
          });
          tr.classList.add("is-focused");
          tr.focus?.();
          tr.scrollIntoView({ behavior: "smooth", block: "nearest" });
        }

        function fullRender() {
          els.queueDesc.textContent =
            uiState === "empty"
              ? "現在、対応が必要な項目はありません。"
              : "期限とステータスに応じて並んでいます。";
          renderSummary();
          renderFilters();
          renderTable();
          els.btn.disabled = uiState === "disabled" || uiState === "loading";
          if (uiState === "disabled") {
            els.btn.title = "権限または設定により、この操作は現在できません。";
          } else {
            els.btn.title =
              "未対応の一覧へスクロールし、先頭項目を強調します";
          }
        }

        function syncRadios() {
          document.querySelectorAll('input[name="uiState"]').forEach(function (r) {
            r.checked = r.value === uiState;
          });
        }

        els.btn.addEventListener("click", function () {
          if (els.btn.disabled) return;
          activeFilter = null;
          renderFilters();
          renderTable();
          document.getElementById("queuePanel").scrollIntoView({
            behavior: "smooth",
            block: "start",
          });
          announce("未対応キューの先頭にフォーカスしました。");
          setTimeout(focusFirstPendingRow, 320);
        });

        document.querySelectorAll('input[name="uiState"]').forEach(function (r) {
          r.addEventListener("change", function () {
            if (!r.checked) return;
            uiState = r.value;
            activeFilter = null;
            fullRender();
          });
        });

        fullRender();
      })();
    </script>
  </body>
</html>
