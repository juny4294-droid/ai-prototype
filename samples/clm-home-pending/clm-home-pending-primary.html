<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ContractS CLM — ホーム（ウィジェットダッシュボード）</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0"
      rel="stylesheet"
    />
    <style>
      :root {
        --nav-bg: #141d3d;
        --nav-active: #314574;
        --nav-divider: rgba(255, 255, 255, 0.16);
        --text-inverse: #ffffff;
        --icon-muted: rgba(255, 255, 255, 0.84);
        --brand-primary: #00aa9c;
        --brand-dark: #008479;
        --page-bg: #f8fafc;
        --text-strong: #353947;
        --text-section: #73767f;
        --text-muted: #a8adba;
        --border-input: #e4e7ed;
        --table-header: #fcfdfe;
        --danger: #e64c5b;
        --danger-subtle: #fdedee;
        --warning-bg: #fff9e0;
        --radius: 6px;
        --shadow-card: 0 1px 2px rgba(20, 29, 61, 0.06);
        --modal-backdrop: rgba(20, 29, 61, 0.45);
        --widget-content-height: 300px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Noto Sans JP", sans-serif;
        font-size: 14px;
        line-height: 1.43;
        color: var(--text-strong);
        background: var(--page-bg);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .material-symbols-rounded {
        font-size: 22px;
        font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
        vertical-align: middle;
        line-height: 1;
      }

      .navbar {
        display: flex;
        align-items: center;
        height: 48px;
        padding: 0 16px;
        background: var(--nav-bg);
        color: var(--text-inverse);
        flex-shrink: 0;
      }

      .navbar__product {
        display: flex;
        align-items: center;
        gap: 8px;
        padding-right: 12px;
        border-right: 1px solid var(--nav-divider);
        margin-right: 12px;
      }

      .navbar__logo {
        width: 32px;
        height: 32px;
        border: 1px solid rgba(255, 255, 255, 0.35);
        border-radius: var(--radius);
        display: flex;
        align-items: center;
        justify-content: center;
        background: transparent;
        color: var(--text-inverse);
        cursor: pointer;
        padding: 0;
      }

      .navbar__company {
        font-size: 13px;
        font-weight: 500;
        white-space: nowrap;
      }

      .navbar__caret {
        opacity: 0.75;
        font-size: 18px !important;
      }

      .navbar__nav {
        display: flex;
        align-items: center;
        gap: 4px;
        flex: 1;
        min-width: 0;
      }

      .navbar__link {
        color: var(--text-inverse);
        text-decoration: none;
        padding: 8px 12px;
        border-radius: var(--radius);
        font-size: 13px;
        white-space: nowrap;
      }

      .navbar__link:hover {
        background: rgba(255, 255, 255, 0.08);
      }

      .navbar__link--active {
        background: var(--nav-active);
      }

      .navbar__utils {
        display: flex;
        align-items: center;
        gap: 4px;
        margin-left: auto;
      }

      .navbar__icon-btn {
        width: 36px;
        height: 36px;
        border: none;
        background: transparent;
        color: var(--icon-muted);
        border-radius: var(--radius);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
      }

      .navbar__icon-btn:hover {
        color: var(--text-inverse);
        background: rgba(255, 255, 255, 0.08);
      }

      .navbar__avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        border: 1px solid rgba(255, 255, 255, 0.4);
        display: flex;
        align-items: center;
        justify-content: center;
        margin-left: 4px;
        color: var(--icon-muted);
        background: rgba(255, 255, 255, 0.06);
      }

      .page {
        flex: 1;
        padding: 24px 28px 88px;
        max-width: 1400px;
        width: 100%;
        margin: 0 auto;
      }

      .page-header {
        display: flex;
        flex-wrap: wrap;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 20px;
      }

      .page-header__titles h1 {
        margin: 0 0 4px;
        font-size: 20px;
        font-weight: 700;
        line-height: 1.35;
      }

      .page-header__titles p {
        margin: 0;
        font-size: 13px;
        color: var(--text-section);
        max-width: 520px;
      }

      .page-header__actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }

      .btn-primary {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 10px 18px;
        font-size: 14px;
        font-weight: 700;
        font-family: inherit;
        color: #fff;
        background: var(--brand-primary);
        border: none;
        border-radius: var(--radius);
        cursor: pointer;
        box-shadow: var(--shadow-card);
      }

      .btn-primary:hover:not(:disabled) {
        background: var(--brand-dark);
      }

      .btn-primary:focus-visible {
        outline: 2px solid var(--brand-primary);
        outline-offset: 2px;
      }

      .btn-primary:disabled {
        opacity: 0.45;
        cursor: not-allowed;
        box-shadow: none;
      }

      .btn-secondary {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 16px;
        font-size: 13px;
        font-weight: 700;
        font-family: inherit;
        color: var(--text-strong);
        background: #fff;
        border: 1px solid var(--border-input);
        border-radius: var(--radius);
        cursor: pointer;
      }

      .btn-secondary:hover:not(:disabled) {
        border-color: var(--brand-primary);
        color: var(--brand-dark);
      }

      .btn-secondary:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .dashboard {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .dashboard__empty {
        padding: 48px 24px;
        text-align: center;
        background: #fff;
        border: 1px dashed var(--border-input);
        border-radius: 8px;
        color: var(--text-section);
        font-size: 14px;
      }

      .dashboard__empty button {
        margin-top: 12px;
      }

      .widget {
        background: #fff;
        border: 1px solid var(--border-input);
        border-radius: 8px;
        box-shadow: var(--shadow-card);
        overflow: hidden;
        min-width: 0;
        display: flex;
        flex-direction: column;
        min-height: 0;
      }

      .widget--span-full {
        grid-column: 1 / -1;
      }

      .widget__head {
        padding: 12px 16px;
        border-bottom: 1px solid var(--border-input);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        flex-shrink: 0;
        min-height: 48px;
        box-sizing: border-box;
      }

      .widget__head h2 {
        margin: 0;
        font-size: 13px;
        font-weight: 700;
        color: var(--text-strong);
      }

      .widget__head span {
        font-size: 11px;
        color: var(--text-muted);
        font-weight: 400;
      }

      .widget__body {
        padding: 0;
      }

      .widget__body-outer {
        flex: 1 1 auto;
        min-height: var(--widget-content-height);
        height: var(--widget-content-height);
        max-height: var(--widget-content-height);
        overflow-x: auto;
        overflow-y: auto;
        scrollbar-gutter: stable;
      }

      .widget__body-outer::-webkit-scrollbar {
        width: 6px;
      }

      .widget__body-outer::-webkit-scrollbar-thumb {
        background: var(--border-input);
        border-radius: 3px;
      }

      .dashboard-grid {
        display: grid;
        grid-template-columns: repeat(12, 1fr);
        gap: 16px;
        align-items: stretch;
      }

      /* 1画面に横並びで2ウィジェット（各6/12カラム） */
      .dashboard-grid > .widget {
        grid-column: span 6;
      }

      .create-primary-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .create-primary-row--quad {
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
      }

      .create-primary-row--quad .create-primary-btn {
        min-height: 64px;
        padding: 8px 4px;
        font-size: 10px;
        gap: 4px;
      }

      .create-primary-row--quad .create-primary-btn .material-symbols-rounded {
        font-size: 22px;
      }

      .create-primary-btn {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 12px 8px;
        min-height: 76px;
        border: 2px solid var(--brand-primary);
        border-radius: 8px;
        background: #f1fafb;
        cursor: pointer;
        font: inherit;
        font-size: 12px;
        font-weight: 700;
        line-height: 1.35;
        color: var(--brand-dark);
        text-align: center;
        box-sizing: border-box;
      }

      .create-primary-btn:hover:not(:disabled) {
        background: #dff3f1;
      }

      .create-primary-btn:focus-visible {
        outline: 2px solid var(--brand-primary);
        outline-offset: 2px;
      }

      .create-primary-btn:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .create-primary-btn .material-symbols-rounded {
        font-size: 26px;
        color: var(--brand-primary);
      }

      .create-template-panel {
        padding: 8px 0 4px;
        border-bottom: 1px solid var(--border-input);
      }

      .template-list--compact li {
        border-bottom: 1px solid var(--border-input);
      }

      .template-list--compact button {
        padding: 6px 2px;
      }

      .template-list--compact .template-list__name {
        font-size: 12px;
      }

      .template-list--compact .template-list__meta {
        font-size: 10px;
        margin-top: 1px;
      }

      .template-list--compact .template-list__kind {
        font-size: 9px;
        padding: 1px 6px;
      }

      @media (max-width: 960px) {
        .dashboard-grid > .widget {
          grid-column: 1 / -1;
        }

        :root {
          --widget-content-height: min(300px, 48vh);
        }
      }

      .create-widget-inner {
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding: 10px 12px 12px;
      }

      .quick-action-group {
        margin: 0;
      }

      .quick-action-group__head {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 8px;
      }

      .quick-action-group__title {
        margin: 0;
        font-size: 13px;
        font-weight: 700;
        color: var(--text-strong);
      }

      .quick-action-link {
        font-size: 13px;
        font-weight: 400;
        color: var(--brand-dark);
        text-decoration: none;
        white-space: nowrap;
      }

      .quick-action-link:hover {
        text-decoration: underline;
      }

      .quick-action-card {
        display: flex;
        align-items: stretch;
        justify-content: space-between;
        gap: 10px;
        padding: 10px 12px;
        border: 1px solid var(--border-input);
        border-radius: var(--radius);
        background: #fff;
        cursor: pointer;
        font: inherit;
        text-align: left;
        width: 100%;
        box-sizing: border-box;
        transition: border-color 0.12s ease, background 0.12s ease;
      }

      .quick-action-card:hover:not(:disabled) {
        border-color: var(--brand-primary);
        background: #f1fafb;
      }

      .quick-action-card:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .quick-action-card__main {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        min-width: 0;
      }

      .quick-action-card__icon {
        flex-shrink: 0;
        width: 36px;
        height: 36px;
        border-radius: var(--radius);
        background: #f0f3fa;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--nav-active);
      }

      .quick-action-card__icon .material-symbols-rounded {
        font-size: 22px;
      }

      .quick-action-card__title {
        font-size: 13px;
        font-weight: 700;
        color: var(--text-strong);
      }

      .quick-action-card__desc {
        font-size: 11px;
        color: var(--text-section);
        margin-top: 4px;
        line-height: 1.45;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .quick-action-card__arrow {
        flex-shrink: 0;
        color: var(--brand-primary);
        align-self: center;
      }

      .create-section__title {
        margin: 0 0 8px;
        font-size: 11px;
        font-weight: 700;
        color: var(--text-section);
        letter-spacing: 0.02em;
      }

      .template-list {
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .template-list li {
        border-bottom: 1px solid var(--border-input);
      }

      .template-list li:last-child {
        border-bottom: none;
      }

      .template-list button {
        width: 100%;
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        padding: 10px 4px;
        border: none;
        background: transparent;
        cursor: pointer;
        font: inherit;
        text-align: left;
        color: inherit;
        border-radius: 4px;
      }

      .template-list button:hover:not(:disabled) {
        background: var(--page-bg);
      }

      .template-list button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .template-list__name {
        font-size: 13px;
        font-weight: 500;
        color: var(--text-strong);
      }

      .template-list__meta {
        font-size: 11px;
        color: var(--text-section);
        margin-top: 2px;
      }

      .template-list__kind {
        flex-shrink: 0;
        font-size: 10px;
        font-weight: 700;
        color: var(--brand-dark);
        background: #dff3f1;
        padding: 2px 8px;
        border-radius: 4px;
      }

      .drafts-table-wrap {
        overflow-x: auto;
      }

      .drafts-table-wrap table {
        font-size: 12px;
      }

      .drafts-table-wrap th,
      .drafts-table-wrap td {
        padding: 8px 14px;
      }

      .tasks-widget__foot {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        flex-wrap: wrap;
        padding: 8px 16px 12px;
        border-top: 1px solid var(--border-input);
        font-size: 11px;
        color: var(--text-muted);
      }

      .tasks-widget__foot .btn-ghost {
        font-size: 11px;
        padding: 4px 10px;
      }

      .task-cell-title {
        margin-top: 4px;
        font-size: 13px;
        font-weight: 500;
        color: var(--text-strong);
        line-height: 1.35;
      }

      /* 自分が担当のタスク（tasks_assigned.svg 準拠） */
      .widget__head--tasks .widget__head-start {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }

      .widget__head--tasks h2 {
        font-size: 16px;
        font-weight: 700;
        color: #111827;
      }

      .tasks-head-icon {
        flex-shrink: 0;
        width: 22px;
        height: 22px;
        border-radius: 6px;
        background: #111827;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .tasks-head-icon .material-symbols-rounded {
        font-size: 14px;
        color: #fff;
      }

      .tasks-head-open {
        flex-shrink: 0;
        width: 22px;
        height: 22px;
        padding: 0;
        border: 2px solid #10b981;
        border-radius: 4px;
        background: transparent;
        color: #10b981;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .tasks-head-open .material-symbols-rounded {
        font-size: 14px;
      }

      .tasks-head-open:hover:not(:disabled) {
        background: rgba(16, 185, 129, 0.08);
      }

      .tasks-head-open:focus-visible {
        outline: 2px solid #10b981;
        outline-offset: 2px;
      }

      .tasks-head-open:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .tasks-assigned {
        display: flex;
        flex-direction: column;
        min-height: 0;
        flex: 1;
      }

      .tasks-assigned__list {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        padding: 10px 12px 8px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .tasks-assigned-row {
        display: grid;
        grid-template-columns: 5.75rem minmax(0, 1fr) 7.75rem auto;
        grid-template-rows: auto auto;
        align-items: center;
        column-gap: 10px;
        row-gap: 2px;
        min-height: 46px;
        padding: 8px 12px 8px 10px;
        border: 1px solid #e6eaf0;
        border-radius: 10px;
        background: #fff;
        cursor: pointer;
        font: inherit;
        text-align: left;
        width: 100%;
        box-sizing: border-box;
        transition: border-color 0.12s ease, box-shadow 0.12s ease;
      }

      .tasks-assigned-row:hover:not(:disabled) {
        border-color: #cdd4df;
        box-shadow: 0 8px 24px rgba(11, 18, 32, 0.1);
      }

      button.tasks-assigned-row:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      .tasks-pill {
        grid-row: 1 / -1;
        justify-self: start;
        align-self: center;
        min-width: 74px;
        height: 20px;
        padding: 0 8px;
        border-radius: 7px;
        font-size: 12px;
        font-weight: 700;
        color: #fff;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        line-height: 1;
      }

      .tasks-pill--review {
        background: #8a27a8;
      }

      .tasks-pill--consult {
        background: #314574;
      }

      .tasks-pill--approval {
        background: #047857;
      }

      .tasks-assigned-row__title {
        grid-column: 2;
        grid-row: 1;
        min-width: 0;
        font-size: 13px;
        font-weight: 700;
        color: #111827;
        line-height: 1.3;
      }

      .tasks-assigned-row__due {
        grid-column: 3;
        grid-row: 1 / -1;
        justify-self: start;
        align-self: center;
        font-size: 12px;
        font-weight: 700;
        color: #6b7280;
        line-height: 1.3;
        white-space: nowrap;
      }

      .tasks-assigned-row__status {
        grid-column: 4;
        grid-row: 1 / -1;
        justify-self: end;
        align-self: center;
        font-size: 13px;
        font-weight: 700;
        color: #6b7280;
        text-align: right;
      }

      .kpi-row {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        padding: 16px;
      }

      .kpi-tile {
        flex: 1 1 140px;
        min-width: 120px;
        display: flex;
        align-items: baseline;
        gap: 8px;
        padding: 10px 14px;
        border: 1px solid var(--border-input);
        border-radius: var(--radius);
        cursor: pointer;
        font: inherit;
        color: inherit;
        text-align: left;
        background: var(--table-header);
      }

      .kpi-tile:hover:not(:disabled) {
        border-color: var(--brand-primary);
      }

      .kpi-tile:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      .kpi-tile__label {
        font-size: 12px;
        color: var(--text-section);
      }

      .kpi-tile__value {
        font-size: 18px;
        font-weight: 700;
      }

      .kpi-tile__value--danger {
        color: var(--danger);
      }

      .filter-row {
        padding: 0 16px 12px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .filter-chip {
        font-size: 12px;
        padding: 4px 10px;
        border-radius: 999px;
        border: 1px solid var(--border-input);
        background: #fff;
        cursor: pointer;
        font-family: inherit;
        color: var(--text-section);
      }

      .filter-chip--on {
        border-color: var(--brand-primary);
        background: #dff3f1;
        color: var(--brand-dark);
        font-weight: 700;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }

      th {
        text-align: left;
        padding: 10px 16px;
        background: var(--table-header);
        color: var(--text-section);
        font-weight: 500;
        border-bottom: 1px solid var(--border-input);
        white-space: nowrap;
      }

      td {
        padding: 12px 16px;
        border-bottom: 1px solid var(--border-input);
        vertical-align: top;
      }

      tr:last-child td {
        border-bottom: none;
      }

      tbody tr {
        cursor: pointer;
      }

      tbody tr:hover {
        background: #f8fafc;
      }

      tbody tr.is-focused {
        outline: 2px solid var(--brand-primary);
        outline-offset: -2px;
        background: #f1fafb;
      }

      .cell-title {
        font-weight: 500;
        color: var(--text-strong);
      }

      .cell-meta {
        font-size: 12px;
        color: var(--text-section);
        margin-top: 2px;
      }

      .badge {
        display: inline-block;
        font-size: 11px;
        font-weight: 700;
        padding: 2px 8px;
        border-radius: 4px;
        white-space: nowrap;
      }

      .badge--attention {
        background: var(--danger-subtle);
        color: var(--danger);
      }

      .badge--due {
        background: var(--warning-bg);

            d.root.classList.add("is-open");

        function renderModalOrderList() {
          const ordered = draftOrder.filter(function (id) {
            return draftEnabled[id];

          els.orderList.innerHTML = "";
          if (ordered.length === 0) {
            const li = document.createElement("li");
            li.style.color = "#a8adba";
            li.textContent = "表示中のウィジェットはありません";
            els.orderList.appendChild(li);
            return;
          }
          ordered.forEach(function (id, index) {
            const li = document.createElement("li");
            const def = WIDGET_DEFS[id];
            li.innerHTML =
              '<button type="button" class="order-up" data-wid="' +
              id +
              '" aria-label="上へ">↑</button>' +
              '<button type="button" class="order-down" data-wid="' +
              id +
              '" aria-label="下へ">↓</button>' +
              "<span>" +
              def.title +
              "</span>";
            const up = li.querySelector(".order-up");
            const down = li.querySelector(".order-down");
            up.disabled = index === 0;
            down.disabled = index === ordered.length - 1;
            up.addEventListener("click", function () {
              moveDraftOrder(id, -1);
            });
            down.addEventListener("click", function () {
              moveDraftOrder(id, 1);
            });
            els.orderList.appendChild(li);
          });
        }

        function moveDraftOrder(id, delta) {
          const idx = draftOrder.indexOf(id);
          if (idx < 0) return;
          const j = idx + delta;
          if (j < 0 || j >= draftOrder.length) return;
          const tmp = draftOrder[idx];
          draftOrder[idx] = draftOrder[j];
          draftOrder[j] = tmp;
          renderModalOrderList();
        }

              returned: "差戻し",
            };
            const chip = document.createElement("button");
            chip.type = "button";
            chip.className = "filter-chip filter-chip--on";
            chip.textContent = labels[activeFilter] + "で絞り込み";
            chip.addEventListener("click", function () {
              activeFilter = null;
              renderDashboard();
              announce("絞り込みを解除しました。");
            });
            filterHost.appendChild(chip);
          }

          const rows = filteredRows();
          const table = document.createElement("table");
          table.innerHTML =
            "<thead><tr><th>種別</th><th>件名 / 文脈</th><th>期限</th><th>状態</th></tr></thead>";
          const tb = document.createElement("tbody");
          rows.forEach(function (r, idx) {
            const tr = document.createElement("tr");
            tr.tabIndex = -1;
            tr.innerHTML =
              "<td>" +
              r.kind +
              '</td><td><div class="cell-title">' +
              r.title +
              '</div><div class="cell-meta">' +
              r.meta +
              "</div></td><td>" +
              r.due +
              '</td><td><span class="badge badge--' +
              r.badgeVariant +
              '">' +
              r.badge +
              "</span></td>";
            if (uiState === "disabled") {
              tr.style.opacity = "0.55";
              tr.style.cursor = "not-allowed";
            } else {
              tr.addEventListener("click", function () {
                announce("詳細画面へ遷移する想定です。");
              });
            }
            tb.appendChild(tr);
          });
          table.appendChild(tb);
          body.appendChild(table);
          host.appendChild(filterHost);
          host.appendChild(body);
        }

        function renderTasksWidget(host) {
          const wrap = document.createElement("div");
          wrap.className = "widget__body tasks-assigned";

          if (uiState === "loading") {
            wrap.innerHTML =
              '<div class="tasks-assigned__list"><div class="skeleton" style="height:46px;border-radius:10px"></div><div class="skeleton" style="height:46px;border-radius:10px"></div><div class="skeleton" style="height:46px;border-radius:10px"></div></div>';
            host.appendChild(wrap);
            return;
          }

          if (uiState === "error") {
            const box = document.createElement("div");
            box.className = "error-block";
            box.innerHTML =
              '<p>タスクを読み込めませんでした。</p><button type="button" class="btn-ghost" id="retryTasks">再試行</button>';
            wrap.appendChild(box);
            host.appendChild(wrap);
            setTimeout(function () {
              document.getElementById("retryTasks")?.addEventListener("click", function () {
                uiState = "default";
                syncRadios();
                fullRender();
                announce("再読み込みしました。");
              });
            }, 0);
            return;
          }

          if (uiState === "empty") {
            const box = document.createElement("div");
            box.className = "empty-block";
            box.innerHTML =
              "<p>表示するタスクはありません。</p><button type=\"button\" class=\"btn-ghost\" id=\"allTasks\">タスクの全件表示へ</button>";
            wrap.appendChild(box);
            host.appendChild(wrap);
            setTimeout(function () {
              document.getElementById("allTasks")?.addEventListener("click", function () {
                announce("タスク一覧画面へ遷移する想定です。");
              });
            }, 0);
            return;
          }

          const list = document.createElement("div");
          list.className = "tasks-assigned__list";

          ASSIGNED_TASK_ROWS.forEach(function (t) {
            const row = document.createElement("button");
            row.type = "button";
            row.className = "tasks-assigned-row";
            if (uiState === "disabled") {
              row.disabled = true;
            }
            const pillClass =
              t.pillVariant === "consult"
                ? "tasks-pill--consult"
                : t.pillVariant === "approval"
                  ? "tasks-pill--approval"
                  : "tasks-pill--review";
            row.innerHTML =
              '<span class="tasks-pill ' +
              pillClass +
              '">' +
              t.pill +
              '</span><span class="tasks-assigned-row__title">' +
              t.title +
              '</span><span class="tasks-assigned-row__due">期限: ' +
              t.due +
              '</span><span class="tasks-assigned-row__status">' +
              t.status +
              "</span>";
            if (uiState !== "disabled") {
              row.addEventListener("click", function () {
                openTaskDrawer(t, row);
              });
            }
            list.appendChild(row);
          });

          wrap.appendChild(list);

          const foot = document.createElement("div");
          foot.className = "tasks-widget__foot";
          foot.innerHTML =
            "<span>全 " +
            ASSIGNED_TASK_ROWS.length +
            " 件中 1〜" +
            ASSIGNED_TASK_ROWS.length +
            ' 件を表示</span><button type="button" class="btn-ghost" id="tasksMore">もっと見る</button>';
          wrap.appendChild(foot);
          host.appendChild(wrap);

          setTimeout(function () {
            document.getElementById("tasksMore")?.addEventListener("click", function () {
              announce("タスクの全件一覧へ遷移する想定です。");
            });
          }, 0);
        }

        function renderShortcutsWidget(host) {
          const div = document.createElement("div");
          div.className = "shortcuts-body widget__body";
          div.innerHTML =
            "<ul><li><a href=\"#\">契約一覧へ</a></li><li><a href=\"#\">案件一覧へ</a></li><li><a href=\"#\">プロジェクト一覧へ</a></li></ul><p>ダッシュボードの任意配置用。主作業はワークキューウィジェット側で完結させます。</p>";
          host.appendChild(div);
        }

        function renderNewsWidget(host) {
          const div = document.createElement("div");
          div.className = "news-body widget__body";
          if (uiState === "loading") {
            div.innerHTML =
              '<div class="news-item"><div class="skeleton" style="width:40%;margin-bottom:8px"></div><div class="skeleton" style="width:85%"></div></div>';
            host.appendChild(div);
            return;
          }
          div.innerHTML = NEWS_ITEMS.map(function (n) {
            return (
              '<div class="news-item"><div class="news-item__date">' +
              n.date +
              '</div><div class="news-item__title">' +
              n.title +
              "</div></div>"
            );
          }).join("");
          host.appendChild(div);
        }

        function renderDashboard() {
          resetTaskDrawerForNav();
          els.dashboard.innerHTML = "";
          const ids = visibleWidgetIds();

          if (ids.length === 0) {
            const empty = document.createElement("div");
            empty.className = "dashboard__empty";
            empty.innerHTML =
              "<p>表示するウィジェットがありません。<br />「ウィジェットを管理」からブロックを選んでください。</p><button type=\"button\" class=\"btn-primary\" id=\"emptyOpenModal\">ウィジェットを管理</button>";
            els.dashboard.appendChild(empty);
            document.getElementById("emptyOpenModal")?.addEventListener("click", openModal);
            return;
          }

          const grid = document.createElement("div");
          grid.className = "dashboard-grid";

          ids.forEach(function (wid) {
            const def = WIDGET_DEFS[wid];
            const section = document.createElement("section");
            section.className = "widget " + def.className;
            section.id = "w-" + wid;
            const head = document.createElement("div");
            if (wid === "tasks") {
              head.className = "widget__head widget__head--tasks";
              head.innerHTML =
                '<div class="widget__head-start"><span class="tasks-head-icon" aria-hidden="true"><span class="material-symbols-rounded">assignment_turned_in</span></span><div><h2>' +
                def.title +
                '</h2></div></div><button type="button" class="tasks-head-open" aria-label="タスク一覧を開く"><span class="material-symbols-rounded" aria-hidden="true">open_in_new</span></button>';
            } else {
              head.className = "widget__head";
              head.innerHTML =
                "<div><h2>" +
                def.title +
                "</h2><span>ウィジェット</span></div>";
            }
            section.appendChild(head);
            if (wid === "tasks") {
              const openBtn = head.querySelector(".tasks-head-open");
              if (openBtn) {
                if (uiState === "disabled") {
                  openBtn.disabled = true;
                } else {
                  openBtn.addEventListener("click", function () {
                    announce("タスク一覧画面へ遷移する想定です。");
                  });
                }
              }
            }
            const bodyHost = document.createElement("div");
            bodyHost.className = "widget__body-outer";
            if (wid === "kpi") renderKpiWidget(bodyHost);
            else if (wid === "create") renderCreateWidget(bodyHost);
            else if (wid === "drafts") renderDraftsWidget(bodyHost);
            else if (wid === "queue") renderQueueWidget(bodyHost);
            else if (wid === "tasks") renderTasksWidget(bodyHost);
            else if (wid === "shortcuts") renderShortcutsWidget(bodyHost);
            else if (wid === "news") renderNewsWidget(bodyHost);
            section.appendChild(bodyHost);
            grid.appendChild(section);
          });

          els.dashboard.appendChild(grid);
        }

        function focusFirstQueueRow() {
          const tr = document.querySelector("#w-queue tbody tr");
          if (!tr) return;
          document.querySelectorAll("#w-queue tbody tr").forEach(function (r) {
            r.classList.remove("is-focused");
          });
          tr.classList.add("is-focused");
          tr.focus();
          tr.scrollIntoView({ behavior: "smooth", block: "nearest" });
        }

        function fullRender() {
          renderDashboard();
          els.btnProcess.disabled =
            uiState === "disabled" ||
            uiState === "loading" ||
            !enabledWidgets.queue;
          if (!enabledWidgets.queue) {
            els.btnProcess.title = "ワークキューウィジェットを表示してください。";
          } else if (uiState === "disabled") {
            els.btnProcess.title = "権限または設定により、この操作は現在できません。";
          } else {
            els.btnProcess.title =
              "ワークキューウィジェットへ移動し、先頭行を強調します";
          }
          els.btnModal.disabled = uiState === "loading";
        }

        function syncRadios() {
          document.querySelectorAll('input[name="uiState"]').forEach(function (r) {
            r.checked = r.value === uiState;
          });
        }

        els.btnModal.addEventListener("click", openModal);
        els.modalClose.addEventListener("click", closeModal);
        els.modalCancel.addEventListener("click", closeModal);
        els.modalApply.addEventListener("click", applyModal);
        els.modal.addEventListener("click", function (e) {
          if (e.target === els.modal) closeModal();
        });

        els.btnProcess.addEventListener("click", function () {
          if (els.btnProcess.disabled) return;
          activeFilter = null;
          document.getElementById("w-queue")?.scrollIntoView({
            behavior: "smooth",
            block: "start",
          });
          announce("ワークキューの先頭にフォーカスしました。");
          setTimeout(focusFirstQueueRow, 350);
        });

        document.querySelectorAll('input[name="uiState"]').forEach(function (r) {
          r.addEventListener("change", function () {
            if (!r.checked) return;
            uiState = r.value;
            activeFilter = null;
            fullRender();
          });
        });

        document.addEventListener("keydown", function (e) {
          if (e.key !== "Escape") return;
          const tdRoot = document.getElementById("taskDrawerRoot");
          if (tdRoot && !tdRoot.hidden && tdRoot.classList.contains("is-open")) {
            e.preventDefault();
            closeTaskDrawer();
            return;
          }
          if (!els.modal.hidden) closeModal();
        });

        initTaskDrawer();
        fullRender();
      })();
    </script>
  </body>
</html>
