<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ContractS CLM Sample | 契約書検索</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=alternate_email,close,domain,help,keyboard_arrow_down,keyboard_arrow_up,keyboard_double_arrow_left,keyboard_double_arrow_right,notifications,person,search&display=block"
    >
    <link rel="stylesheet" href="./styles.css">
    <script defer src="./app.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="global-header">
        <div class="header-left">
          <div class="brand-area">
            <button type="button" class="logo-button" aria-label="ホームへ移動">
              <span class="material-symbols-rounded nav-icon" aria-hidden="true">domain</span>
            </button>
            <button type="button" class="company-button" aria-label="所属会社を切り替える">
              <span class="company-label">【社内】ContractS株式会社</span>
              <span class="company-caret" aria-hidden="true">▼</span>
            </button>
          </div>
          <span class="header-divider" aria-hidden="true"></span>
          <nav class="global-nav" aria-label="グローバルナビゲーション">
            <a href="#" class="nav-item is-active" aria-current="page">ホーム</a>
            <a href="#" class="nav-item">契約管理</a>
            <a href="#" class="nav-item">案件管理</a>
          </nav>
        </div>
        <div class="utility-nav" aria-label="補助操作">
          <button type="button" class="utility-button" aria-label="ヘルプ">
            <span class="material-symbols-rounded nav-icon" aria-hidden="true">help</span>
          </button>
          <button type="button" class="utility-button" aria-label="検索">
            <span class="material-symbols-rounded nav-icon" aria-hidden="true">search</span>
          </button>
          <button type="button" class="utility-button" aria-label="アカウント窓口">
            <span class="material-symbols-rounded nav-icon" aria-hidden="true">alternate_email</span>
          </button>
          <button type="button" class="utility-button is-notification" aria-label="通知 3 件">
            <span class="material-symbols-rounded nav-icon" aria-hidden="true">notifications</span>
            <span class="notification-dot" aria-hidden="true"></span>
          </button>
          <button type="button" class="avatar-button" aria-label="ユーザーメニューを開く">
            <span class="material-symbols-rounded nav-icon nav-icon-person" aria-hidden="true">person</span>
          </button>
        </div>
      </header>

      <div class="workspace">
        <main class="main-column">
          <section class="stats-grid" aria-label="集計サマリー">
            <article class="card stat-card">
              <p class="stat-label">検索結果</p>
              <p class="stat-value" id="statTotal">0</p>
              <p class="stat-meta" id="statTotalMeta">表示中 0 件</p>
            </article>
            <article class="card stat-card">
              <p class="stat-label">締結済み</p>
              <p class="stat-value" id="statActive">0</p>
              <p class="stat-meta">締結済みの契約</p>
            </article>
            <article class="card stat-card">
              <p class="stat-label">30日以内終了</p>
              <p class="stat-value" id="statExpiring">0</p>
              <p class="stat-meta">更新確認が必要</p>
            </article>
            <article class="card stat-card">
              <p class="stat-label">レビュー対象</p>
              <p class="stat-value" id="statReview">0</p>
              <p class="stat-meta">承認進行中 / 締結差戻し</p>
            </article>
          </section>

          <section class="search-layout" aria-label="契約検索レイアウト">
            <aside class="card filter-sidebar" id="filterSidebar" aria-labelledby="filterPanelTitle">
              <div class="filter-sidebar-main">
                <div class="panel-head filter-sidebar-head">
                  <div>
                    <p class="section-label">Detailed Filters</p>
                    <h2 id="filterPanelTitle">検索条件</h2>
                  </div>
                  <p class="panel-note">条件が多いため、左カラムで詳細に絞り込みます。</p>
                </div>

                <div class="filter-stack">
                  <section class="filter-group" aria-labelledby="filterGroupSearch">
                    <p class="filter-group-title" id="filterGroupSearch">全文検索</p>
                    <label class="field field-search">
                      <span class="field-label">キーワード</span>
                      <span class="field-control field-control-search">
                        <input
                          id="searchInput"
                          name="search"
                          type="search"
                          placeholder="契約名・契約先・担当者で検索"
                          autocomplete="off"
                        >
                        <span class="field-suffix-icon material-symbols-rounded" aria-hidden="true">search</span>
                      </span>
                    </label>
                  </section>

                  <section class="filter-group" aria-labelledby="filterGroupAttribute">
                    <p class="filter-group-title" id="filterGroupAttribute">契約属性</p>
                    <label class="field">
                      <span class="field-label">ステータス</span>
                      <select id="statusFilter" name="status">
                        <option value="all">すべて</option>
                      </select>
                    </label>

                    <label class="field">
                      <span class="field-label">契約種別</span>
                      <select id="categoryFilter" name="category">
                        <option value="all">すべて</option>
                      </select>
                    </label>

                    <label class="field">
                      <span class="field-label">終了期限</span>
                      <select id="deadlineFilter" name="deadline">
                        <option value="all">指定なし</option>
                        <option value="30">30日以内</option>
                        <option value="90">90日以内</option>
                        <option value="expired">期限切れ含む</option>
                      </select>
                    </label>
                  </section>

                  <section class="filter-group" aria-labelledby="filterGroupOwner">
                    <p class="filter-group-title" id="filterGroupOwner">管理情報</p>
                    <label class="field">
                      <span class="field-label">担当部署</span>
                      <select id="departmentFilter" name="department">
                        <option value="all">すべて</option>
                      </select>
                    </label>

                    <label class="field">
                      <span class="field-label">並び順</span>
                      <select id="sortSelect" name="sort">
                        <option value="none">ソート指定なし</option>
                        <option value="updatedAt:desc">最終更新日が新しい順</option>
                        <option value="updatedAt:asc">最終更新日が古い順</option>
                        <option value="endDate:asc">終了日が近い順</option>
                        <option value="endDate:desc">終了日が遠い順</option>
                        <option value="amount:desc">契約金額が高い順</option>
                        <option value="amount:asc">契約金額が低い順</option>
                        <option value="name:asc">契約名の昇順</option>
                        <option value="name:desc">契約名の降順</option>
                        <option value="counterparty:asc">契約先の昇順</option>
                        <option value="counterparty:desc">契約先の降順</option>
                        <option value="status:asc">ステータスの昇順</option>
                        <option value="status:desc">ステータスの降順</option>
                      </select>
                    </label>
                  </section>
                </div>

                <div class="filter-footer">
                  <div class="active-filters" id="activeFilters" aria-live="polite"></div>
                  <div class="filter-actions">
                    <button type="button" class="button button-light button-size-md" id="resetFilterButton">
                      条件をリセット
                    </button>
                    <button type="button" class="button button-outline button-size-md" id="exportFilterButton">
                      現在条件でCSV出力
                    </button>
                  </div>
                </div>
              </div>

              <div class="filter-sidebar-rail" aria-hidden="true">
                <button
                  type="button"
                  class="filter-rail-button"
                  id="filterRailButton"
                  aria-label="検索条件を開く"
                >
                  <span class="material-symbols-rounded" aria-hidden="true">search</span>
                </button>
              </div>

              <div class="filter-sidebar-bottom">
                <button
                  type="button"
                  class="filter-toggle-button"
                  id="filterToggleButton"
                  aria-controls="filterSidebar"
                  aria-expanded="true"
                  aria-label="検索条件を閉じる"
                >
                  <span
                    class="material-symbols-rounded filter-toggle-icon filter-toggle-icon-collapse"
                    aria-hidden="true"
                  >keyboard_double_arrow_left</span>
                  <span
                    class="material-symbols-rounded filter-toggle-icon filter-toggle-icon-expand"
                    aria-hidden="true"
                  >keyboard_double_arrow_right</span>
                  <span class="filter-toggle-label filter-toggle-label-collapse">検索条件を閉じる</span>
                  <span class="filter-toggle-label filter-toggle-label-expand">検索条件を開く</span>
                </button>
              </div>
            </aside>

            <section class="card results-panel" aria-labelledby="resultsPanelTitle">
              <div class="panel-head">
                <div>
                  <p class="section-label">Result Summary</p>
                  <h2 id="resultsPanelTitle">検索結果</h2>
                </div>
                <div class="panel-note-group">
                  <span class="panel-note" id="resultCount">0件</span>
                  <span class="panel-note" id="sortSummary">並び順: 指定なし</span>
                </div>
              </div>

              <div class="table-wrap">
                <table class="contracts-table">
                  <thead>
                    <tr>
                      <th scope="col">
                        <button type="button" class="sort-button" data-sort-key="name">
                          <span class="sort-button-label">契約名</span>
                          <span class="sort-icons" aria-hidden="true">
                            <span class="material-symbols-rounded sort-icon sort-icon-up">keyboard_arrow_up</span>
                            <span class="material-symbols-rounded sort-icon sort-icon-down">keyboard_arrow_down</span>
                          </span>
                        </button>
                      </th>
                      <th scope="col">
                        <button type="button" class="sort-button" data-sort-key="status">
                          <span class="sort-button-label">ステータス</span>
                          <span class="sort-icons" aria-hidden="true">
                            <span class="material-symbols-rounded sort-icon sort-icon-up">keyboard_arrow_up</span>
                            <span class="material-symbols-rounded sort-icon sort-icon-down">keyboard_arrow_down</span>
                          </span>
                        </button>
                      </th>
                      <th scope="col">
                        <button type="button" class="sort-button" data-sort-key="counterparty">
                          <span class="sort-button-label">契約先</span>
                          <span class="sort-icons" aria-hidden="true">
                            <span class="material-symbols-rounded sort-icon sort-icon-up">keyboard_arrow_up</span>
                            <span class="material-symbols-rounded sort-icon sort-icon-down">keyboard_arrow_down</span>
                          </span>
                        </button>
                      </th>
                      <th scope="col">契約種別</th>
                      <th scope="col">担当者</th>
                      <th scope="col">
                        <button type="button" class="sort-button is-right" data-sort-key="endDate">
                          <span class="sort-button-label">終了日</span>
                          <span class="sort-icons" aria-hidden="true">
                            <span class="material-symbols-rounded sort-icon sort-icon-up">keyboard_arrow_up</span>
                            <span class="material-symbols-rounded sort-icon sort-icon-down">keyboard_arrow_down</span>
                          </span>
                        </button>
                      </th>
                      <th scope="col">
                        <button type="button" class="sort-button is-right" data-sort-key="updatedAt">
                          <span class="sort-button-label">最終更新</span>
                          <span class="sort-icons" aria-hidden="true">
                            <span class="material-symbols-rounded sort-icon sort-icon-up">keyboard_arrow_up</span>
                            <span class="material-symbols-rounded sort-icon sort-icon-down">keyboard_arrow_down</span>
                          </span>
                        </button>
                      </th>
                    </tr>
                  </thead>
                  <tbody id="tableBody"></tbody>
                </table>
              </div>

              <div class="results-footer">
                <div class="pagination" id="pagination" aria-label="ページネーション"></div>
                <div class="pagination-page-size">
                  <label class="pagination-page-size-label" for="pageSizeSelect">件数</label>
                  <select id="pageSizeSelect" name="pageSize" aria-label="1ページの表示件数">
                    <option value="10" selected>10</option>
                    <option value="20">20</option>
                    <option value="50">50</option>
                  </select>
                  <span class="pagination-page-size-unit">項目 / ページ</span>
                </div>
                <p class="pagination-total-count" id="paginationTotalCount">0 件</p>
              </div>
            </section>
          </section>
        </main>
      </div>

      <div class="drawer-backdrop" id="drawerBackdrop" hidden></div>
      <aside
        class="detail-drawer"
        id="detailDrawer"
        aria-labelledby="detailPanelTitle"
        aria-hidden="true"
      >
        <div class="detail-drawer-inner card">
          <div class="panel-head detail-drawer-head">
            <div>
              <p class="section-label">Row Detail</p>
              <h2 id="detailPanelTitle">契約サマリー</h2>
            </div>
            <button type="button" class="drawer-close" id="drawerCloseButton" aria-label="詳細サイドバーを閉じる">
              <span class="material-symbols-rounded" aria-hidden="true">close</span>
            </button>
          </div>

          <div id="detailContent" class="detail-content"></div>
        </div>
      </aside>

      <div class="toast-stack" id="toastStack" aria-live="polite" aria-atomic="true"></div>
    </div>
  </body>
</html>
